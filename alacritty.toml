[shell]
args = ["--cd ~"]
program = "wsl"
[window]
startup_mode = "Windowed"
dimensions = { columns = 90, lines = 27 }
# opacity = 0.7
dynamic_padding = true

[font]
normal = {family = "Hack Nerd Font Mono"}
size = 15.0

[keyboard]
bindings = [
{ key = "c", mods = "Control", action = "Copy" },
{ key = "v", mods = "Control", action= "Paste" },
]

